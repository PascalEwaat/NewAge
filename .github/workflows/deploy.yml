name: Deploy experiments to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: image-spring/package-lock.json

      - name: Test and build image-spring
        working-directory: image-spring
        run: |
          npm ci
          npm test
          npx vite build --base=/NewAge/image-spring/

      - name: Assemble site
        run: |
          mkdir -p _site/image-spring
          cp -r image-spring/dist/. _site/image-spring/
          cp site/index.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
